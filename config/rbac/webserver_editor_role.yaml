# This rule is not used by the project web-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the web.xm.web.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: web-operator
    app.kubernetes.io/managed-by: kustomize
  name: webserver-editor-role
rules:
- apiGroups:
  - web.xm.web
  resources:
  - webservers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - web.xm.web
  resources:
  - webservers/status
  verbs:
  - get
